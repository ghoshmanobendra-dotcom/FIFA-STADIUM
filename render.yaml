# Render.com blueprint — a natural fit for this long-running Node server.
# Deploy: push to GitHub, then "New +" → "Blueprint" and point Render at the repo.
services:
  - type: web
    name: stadiumiq-2026
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Leave ANTHROPIC_API_KEY unset to run the offline engine, or add it as a
      # secret in the Render dashboard to enable live GenAI.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AI_MODEL
        value: claude-sonnet-5
      - key: CORS_ORIGINS
        value: '*'
      - key: RATE_LIMIT_MAX
        value: '60'
      - key: RATE_LIMIT_AI_MAX
        value: '20'
